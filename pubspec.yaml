name: putra_sport_hub
description: "PutraSportHub - Campus Sports Ecosystem for Universiti Putra Malaysia (UPM)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.4.1
  cloud_firestore: ^5.6.0
  cloudinary_flutter: ^1.1.2
  connectivity_plus: ^6.0.0
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.8.0
  equatable: ^2.0.7
  firebase_analytics: ^11.3.3
  firebase_auth: ^5.3.4
  firebase_core: ^3.8.1
  flutter_animate: ^4.5.2
  flutter_riverpod: ^2.6.1
  flutter_svg: ^2.0.17
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  hive_flutter: ^1.1.0
  http: ^1.3.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  lottie: ^3.3.1
  mobile_scanner: ^6.0.5
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  pdf: ^3.11.3
  printing: ^5.14.2
  qr_flutter: ^4.1.0
  riverpod_annotation: ^2.6.1
  share_plus: ^10.1.1
  shared_preferences: ^2.5.2
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.4.15
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.8
  freezed_annotation: ^2.4.4
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4

flutter:
  uses-material-design: true

  # Assets will be added as needed
  assets:
    - .env  # For web development only - REMOVE before committing to public repo!
    - assets/images/
    - assets/images/facilities/
    - assets/images/facilities/football/
    - assets/images/facilities/futsal/
    - assets/images/facilities/badminton/
    - assets/images/facilities/tennis/
    - assets/images/logos/
    - assets/icons/

  # Using google_fonts package for dynamic font loading
  # No local font files required
